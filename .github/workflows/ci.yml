name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @ci-shard-advisor/core test:coverage
      - run: pnpm --filter @ci-shard-advisor/web build

  e2e:
    name: Web end-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ci-shard-advisor/web exec playwright install --with-deps chromium
      - run: pnpm --filter @ci-shard-advisor/web e2e
