name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push supersedes the runs of the old commit — don't pay for both.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # Each suite runs exactly once: the adapters emit their JUnit XML while
      # testing, and the core runs under its coverage gate (JUnit included).
      - name: Test the adapters (JUnit XML for Xray — see docs/xray.md)
        run: pnpm --filter '!@ci-shard-advisor/core' test:junit
      - name: Test the core under the coverage gate (JUnit XML included)
        run: pnpm --filter @ci-shard-advisor/core test:coverage
      - run: pnpm --filter @ci-shard-advisor/web build
      - name: Upload the JUnit XML (import into Xray from here)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: |
            packages/*/reports/junit/*.xml
            apps/*/reports/junit/*.xml
          retention-days: 7

  e2e:
    name: Web end-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ci-shard-advisor/web exec playwright install --with-deps chromium
      - run: pnpm --filter @ci-shard-advisor/web e2e

  # Dogfooding: the Cypress E2E runs sharded (one spec per container), each
  # container keeps its own mochawesome JSON — download both artifacts and feed
  # them to CI Shard Advisor for a measured per-shard analysis of this very CI.
  e2e-cypress:
    name: Web end-to-end (Cypress, shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            spec: demo
          - shard: 2
            spec: upload
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache the Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          # A lockfile bump still restores the previous binary; the install
          # step below then only downloads when the version really changed.
          restore-keys: cypress-${{ runner.os }}-
      # The binary is installed on demand (allowBuilds blocks it in pnpm install).
      - run: pnpm --filter @ci-shard-advisor/web exec cypress install
      - run: pnpm --filter @ci-shard-advisor/web build
      - name: Run this shard's spec with a mochawesome report
        run: >-
          pnpm --filter @ci-shard-advisor/web exec start-server-and-test
          'vite preview --port 4173 --strictPort' http://localhost:4173
          'cypress run --spec cypress/e2e/${{ matrix.spec }}.cy.ts --reporter mochawesome --reporter-options reportDir=reports/cypress,overwrite=false,html=false,json=true'
      - name: Upload this shard's report (feed both to CI Shard Advisor)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-shard-${{ matrix.shard }}
          path: apps/web/reports/cypress/*.json
          retention-days: 7
