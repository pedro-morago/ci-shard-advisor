# Generated by CI Shard Advisor — each step runs its duration-optimal spec list.
image: node:20
pipelines:
  default:
    - parallel:
        - step:
            name: Container 1/2 (optimal split)
            script:
              - npm ci
              - npx cypress run --reporter mochawesome --reporter-options "reportDir=reports,overwrite=false,html=false,json=true" --spec "cypress/e2e/checkout.cy.ts"
            artifacts:
              - reports/**
        - step:
            name: Container 2/2 (optimal split)
            script:
              - npm ci
              - npx cypress run --reporter mochawesome --reporter-options "reportDir=reports,overwrite=false,html=false,json=true" --spec "cypress/e2e/cart.cy.ts,cypress/e2e/login.cy.ts,cypress/e2e/profile.cy.ts,cypress/e2e/search.cy.ts"
            artifacts:
              - reports/**

