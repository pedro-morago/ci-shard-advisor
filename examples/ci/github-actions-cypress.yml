# Example: the workflow CI Shard Advisor generates for the sample run
# (`ci-shard-advisor samples/cypress-containers/*.json --setup 45s --format github`).
# Each parallel job runs EXACTLY its duration-optimal spec list and keeps its
# own mochawesome report — the input for the next analysis. (Lives under
# examples/ so it does NOT run in this repo.)
# Generated by CI Shard Advisor — each job runs its duration-optimal spec list.
name: Tests (optimal split)
on:
  push:
    branches: [main]
  pull_request:
jobs:
  shard-1:
    name: Container 1/2 (optimal split)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run this shard's specs
        run: npx cypress run --reporter mochawesome --reporter-options "reportDir=reports,overwrite=false,html=false,json=true" --spec "cypress/e2e/checkout.cy.ts"
      - name: Upload this shard's report (feed all of them back to the advisor)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: shard-1
          path: reports/
          retention-days: 7
  shard-2:
    name: Container 2/2 (optimal split)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run this shard's specs
        run: npx cypress run --reporter mochawesome --reporter-options "reportDir=reports,overwrite=false,html=false,json=true" --spec "cypress/e2e/cart.cy.ts,cypress/e2e/login.cy.ts,cypress/e2e/profile.cy.ts,cypress/e2e/search.cy.ts"
      - name: Upload this shard's report (feed all of them back to the advisor)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: shard-2
          path: reports/
          retention-days: 7

